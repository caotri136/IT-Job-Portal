services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DB_HOST: database
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app-network

  database:
    image: postgres:latest
    environment:
      POSTGRES_DB: pet_pr1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 13152029
    volumes:
      - db-data:/var/lib/postgresql/
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:

networks:
  app-network: